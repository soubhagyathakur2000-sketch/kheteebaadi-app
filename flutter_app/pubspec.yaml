name: kheteebaadi
description: Agricultural marketplace app with offline-first architecture for Indian farmers.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # State Management
  flutter_riverpod: ^2.4.0

  # Networking
  dio: ^5.3.1
  connectivity_plus: ^5.0.0

  # Local Storage
  drift: ^2.13.0
  sqlite3_flutter_libs: ^0.5.18
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Serialization
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  uuid: ^4.0.0

  # File and Path handling
  path_provider: ^2.1.1

  # Background Tasks
  workmanager: ^0.5.2

  # Image caching
  cached_network_image: ^3.3.0

  # Loading shimmer
  shimmer: ^3.0.0

  # Routing
  go_router: ^12.0.0

  # Phase 4 - Voice, Camera, Payment
  speech_to_text: ^6.6.0
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0
  razorpay_flutter: ^1.3.7
  flutter_svg: ^2.0.9
  lottie: ^3.1.0
  geolocator: ^11.0.0
  geocoding: ^2.2.0
  url_launcher: ^6.2.2
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.6
  drift_dev: ^2.13.0
  freezed: ^2.4.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf
        - asset: assets/fonts/OpenSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/OpenSans-SemiBold.ttf
          weight: 600
