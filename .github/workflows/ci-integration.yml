name: Stage 2 - Integration Tests

on:
  pull_request:
    branches:
      - main

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: ci-lint-unit

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: kheteebaadi_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install -e .
          pip install pytest pytest-cov alembic

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo 'Waiting for PostgreSQL...'
            sleep 1
          done

      - name: Run Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kheteebaadi_test
        run: alembic upgrade head

      - name: Run Python integration tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kheteebaadi_test
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/integration/ --cov=src --cov-report=xml

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Get Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Run Flutter integration tests
        working-directory: flutter_app
        run: flutter test integration_test/ --verbose

      - name: Upload integration test coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: integration
          fail_ci_if_error: false
