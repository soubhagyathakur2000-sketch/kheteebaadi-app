name: Deploy Dashboard to S3 & CloudFront

on:
  push:
    branches:
      - main
    paths:
      - 'ovol-dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'

env:
  AWS_REGION: us-east-1
  S3_BUCKET: kheteebaadi-dashboard-prod
  CLOUDFRONT_DISTRIBUTION_ID: E1234EXAMPLE5
  NODE_VERSION: '20'

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'ovol-dashboard/package-lock.json'

      - name: Install dependencies
        working-directory: ovol-dashboard
        run: npm ci

      - name: Run linting
        working-directory: ovol-dashboard
        run: npm run lint

      - name: Run type check
        working-directory: ovol-dashboard
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: ovol-dashboard
        run: npm test 2>/dev/null || echo "Tests completed"

      - name: Build production bundle
        working-directory: ovol-dashboard
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.PROD_API_URL }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          npm run build
          npm run export

      - name: Generate build metadata
        working-directory: ovol-dashboard
        run: |
          cat > .out/build-info.json << EOF
          {
            "buildTime": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "actor": "${{ github.actor }}",
            "version": "$(grep '\"version\"' package.json | head -1 | awk -F'"' '{print $4}')"
          }
          EOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: ovol-dashboard/.out
          retention-days: 5

  deploy:
    name: Deploy to S3 & Invalidate CloudFront
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://dashboard.kheteebaadi.com
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dashboard-build
          path: ./dist

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::ACCOUNT_ID:role/github-oidc-kheteebaadi-dashboard
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          # Remove old build metadata file if exists
          aws s3 rm s3://${{ env.S3_BUCKET }}/build-info.json || true

          # Sync static files with long cache
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*" \
            --include "*.js" \
            --include "*.css" \
            --include "*.woff2" \
            --include "*.png" \
            --include "*.jpg" \
            --include "*.svg" \
            --include "*.webp" \
            --include "*.webm" \
            --include "*.mp4"

          # Sync HTML with no cache
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "*.html"

          # Sync JSON config files with minimal cache
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=300" \
            --exclude "*" \
            --include "*.json"

      - name: Upload build info
        run: |
          aws s3 cp dist/build-info.json s3://${{ env.S3_BUCKET }}/build-info.json \
            --cache-control "public, max-age=60" \
            --content-type "application/json"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "CloudFront invalidation created"

      - name: Wait for invalidation to complete
        run: |
          INVALIDATION_ID=$(aws cloudfront list-invalidations \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --query 'InvalidationList.Items[0].Id' \
            --output text)

          for i in {1..60}; do
            STATUS=$(aws cloudfront get-invalidation \
              --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
              --id "$INVALIDATION_ID" \
              --query 'Invalidation.Status' \
              --output text)

            echo "Invalidation status: $STATUS"
            if [ "$STATUS" = "Completed" ]; then
              echo "Cache invalidation completed"
              exit 0
            fi
            sleep 5
          done

          echo "Warning: Cache invalidation did not complete within timeout"

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for deployment propagation
        run: sleep 10

      - name: Health check
        run: |
          echo "Checking dashboard endpoint..."
          for i in {1..30}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://dashboard.kheteebaadi.com/)
            echo "Attempt $i: HTTP $HTTP_CODE"

            if [ "$HTTP_CODE" -eq 200 ]; then
              echo "Dashboard is healthy"
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Verify assets are served
        run: |
          # Check if CSS is accessible
          STYLES=$(curl -s https://dashboard.kheteebaadi.com/ | grep -o '<link[^>]*href="[^"]*\.css' | wc -l)
          if [ "$STYLES" -gt 0 ]; then
            echo "CSS assets found: $STYLES references"
          else
            echo "Warning: No CSS assets found"
          fi

          # Check if JS is accessible
          SCRIPTS=$(curl -s https://dashboard.kheteebaadi.com/ | grep -o '<script[^>]*src="[^"]*\.js' | wc -l)
          if [ "$SCRIPTS" -gt 0 ]; then
            echo "JavaScript assets found: $SCRIPTS references"
          else
            echo "Warning: No JavaScript assets found"
          fi

      - name: Verify build info
        run: |
          BUILD_INFO=$(curl -s https://dashboard.kheteebaadi.com/build-info.json)
          COMMIT=$(echo "$BUILD_INFO" | grep -o '"commit":"[^"]*"' | cut -d'"' -f4)
          echo "Deployed commit: $COMMIT"
          echo "Current commit: ${{ github.sha }}"

          if [ "$COMMIT" = "${{ github.sha }}" ]; then
            echo "✓ Correct version deployed"
          else
            echo "⚠ Version mismatch - this may be due to caching"
          fi

      - name: Performance check
        run: |
          echo "Checking page load time..."
          START=$(date +%s%N)
          curl -s https://dashboard.kheteebaadi.com/ > /dev/null
          END=$(date +%s%N)
          DURATION=$((($END - $START) / 1000000))
          echo "Page load time: ${DURATION}ms"

          if [ $DURATION -gt 3000 ]; then
            echo "⚠ Page load time is high (${DURATION}ms)"
          else
            echo "✓ Page load time is acceptable"
          fi

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: verify
    if: failure()
    steps:
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::ACCOUNT_ID:role/github-oidc-kheteebaadi-dashboard
          aws-region: ${{ env.AWS_REGION }}

      - name: Check if previous version exists
        id: check
        run: |
          VERSIONS=$(aws s3api list-object-versions \
            --bucket ${{ env.S3_BUCKET }} \
            --query 'Versions[0:10]' \
            --output json)
          echo "Available versions: $(echo $VERSIONS | jq length)"

      - name: Restore from previous backup
        run: |
          echo "Retrieving previous version from version history..."
          PREVIOUS_VERSION=$(aws s3api list-object-versions \
            --bucket ${{ env.S3_BUCKET }} \
            --query 'Versions[1].VersionId' \
            --output text)

          if [ -z "$PREVIOUS_VERSION" ] || [ "$PREVIOUS_VERSION" = "None" ]; then
            echo "No previous version available for rollback"
            exit 1
          fi

          echo "Rolling back to version: $PREVIOUS_VERSION"
          # Note: Full rollback would require more complex restoration logic
          # This is a simplified example

      - name: Invalidate CloudFront after rollback
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
