name: Production Deployment

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: kheteebaadi-api
  ECS_CLUSTER: kheteebaadi-prod
  ECS_SERVICE: kheteebaadi-api-prod
  CONTAINER_NAME: kheteebaadi-api

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run Tests (Lint + Unit + Integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Stage 1: Lint & Unit Tests
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Get Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Run dart analyze
        working-directory: flutter_app
        run: dart analyze

      - name: Run Flutter unit tests
        working-directory: flutter_app
        run: flutter test --coverage

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install -e .
          pip install ruff mypy pytest pytest-cov

      - name: Run ruff check
        working-directory: backend
        run: ruff check src/ tests/

      - name: Run mypy
        working-directory: backend
        run: mypy src/ --no-error-summary || true

      - name: Run Python unit tests
        working-directory: backend
        run: pytest tests/unit/ --cov=src --cov-report=xml

      # Stage 2: Integration Tests
      - name: Start PostgreSQL service
        run: |
          docker run -d \
            --name postgres-test \
            -e POSTGRES_DB=kheteebaadi_test \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -p 5432:5432 \
            postgres:15

      - name: Start Redis service
        run: |
          docker run -d \
            --name redis-test \
            -p 6379:6379 \
            redis:7

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres; then
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 1
          done
          exit 1

      - name: Run Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kheteebaadi_test
        run: alembic upgrade head

      - name: Run Python integration tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kheteebaadi_test
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/integration/ --cov=src --cov-report=xml

      - name: Cleanup Docker services
        if: always()
        run: |
          docker stop postgres-test redis-test || true
          docker rm postgres-test redis-test || true

  build-and-push:
    name: Build Docker Image & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::ACCOUNT_ID:role/github-oidc-kheteebaadi-prod
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 1200

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          IMAGE_LATEST="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "image_latest=${IMAGE_LATEST}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        working-directory: backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t ${{ steps.image.outputs.image }} \
            -t ${{ steps.image.outputs.image_latest }} \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref }}" \
            --label "git.repository=${{ github.repository }}" \
            -f Dockerfile \
            .

      - name: Run image security scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.image }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Push Docker image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push ${{ steps.image.outputs.image }}
          docker push ${{ steps.image.outputs.image_latest }}
          echo "Image pushed: ${{ steps.image.outputs.image }}"

  deploy:
    name: Deploy to ECS (Rolling Update)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: https://api.kheteebaadi.com
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::ACCOUNT_ID:role/github-oidc-kheteebaadi-prod
          aws-region: ${{ env.AWS_REGION }}

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition kheteebaadi-api-prod \
            --query 'taskDefinition' > task-definition.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build-and-push.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Wait for ECS tasks to stabilize
        run: |
          for i in {1..60}; do
            RUNNING=$(aws ecs describe-services \
              --cluster ${{ env.ECS_CLUSTER }} \
              --services ${{ env.ECS_SERVICE }} \
              --query 'services[0].runningCount' \
              --output text)
            DESIRED=$(aws ecs describe-services \
              --cluster ${{ env.ECS_CLUSTER }} \
              --services ${{ env.ECS_SERVICE }} \
              --query 'services[0].desiredCount' \
              --output text)

            echo "Running: $RUNNING, Desired: $DESIRED"
            if [ "$RUNNING" -eq "$DESIRED" ] && [ "$RUNNING" -gt 0 ]; then
              echo "ECS service stabilized"
              exit 0
            fi
            sleep 5
          done
          echo "Warning: ECS service did not fully stabilize within timeout"

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Health check
        run: |
          MAX_ATTEMPTS=30
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            if curl -sf https://api.kheteebaadi.com/health; then
              echo "Health check passed"
              exit 0
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "Health check attempt $ATTEMPT/$MAX_ATTEMPTS"
            sleep 2
          done
          echo "Health check failed after $MAX_ATTEMPTS attempts"
          exit 1

      - name: API endpoint test
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.kheteebaadi.com/health)
          if [ "$STATUS" -eq 200 ]; then
            echo "API health endpoint returned 200"
          else
            echo "API health endpoint returned $STATUS"
            exit 1
          fi

      - name: Mandi list endpoint test
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.kheteebaadi.com/api/v1/mandis)
          if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 401 ]; then
            echo "Mandi endpoint returned $STATUS (acceptable)"
          else
            echo "Mandi endpoint returned unexpected status: $STATUS"
            exit 1
          fi

      - name: Auth endpoint test
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.kheteebaadi.com/api/v1/auth/ping)
          if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 401 ]; then
            echo "Auth endpoint returned $STATUS (acceptable)"
          else
            echo "Auth endpoint returned unexpected status: $STATUS"
            exit 1
          fi

      - name: Performance baseline
        run: |
          echo "Running basic performance check..."
          TIME=$({ time curl -s https://api.kheteebaadi.com/health > /dev/null; } 2>&1 | grep real | awk '{print $2}')
          echo "Response time: $TIME"

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: smoke-test
    if: failure()
    steps:
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::ACCOUNT_ID:role/github-oidc-kheteebaadi-prod
          aws-region: ${{ env.AWS_REGION }}

      - name: Get previous task definition
        id: previous
        run: |
          PREVIOUS_REVISION=$(aws ecs describe-task-definition \
            --task-definition kheteebaadi-api-prod \
            --query 'taskDefinition.revision' \
            --output text)
          PREVIOUS_REVISION=$((PREVIOUS_REVISION - 1))
          echo "previous_revision=${PREVIOUS_REVISION}" >> $GITHUB_OUTPUT

      - name: Rollback to previous task definition
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition kheteebaadi-api-prod:${{ steps.previous.outputs.previous_revision }}

      - name: Wait for rollback to complete
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}

      - name: Verify rollback
        run: |
          RUNNING=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query 'services[0].runningCount' \
            --output text)
          echo "Service is running with $RUNNING tasks"

      - name: Notify rollback
        run: |
          echo "Deployment rolled back to previous version"
          echo "Previous revision: ${{ steps.previous.outputs.previous_revision }}"
