name: Stage 3 - E2E Tests & Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging environment
        run: |
          echo "Deploying to staging environment..."
          # Replace with your actual deployment script/command
          # Example: ./scripts/deploy.sh staging

  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'ovol-dashboard/package-lock.json'

      - name: Install dependencies
        working-directory: ovol-dashboard
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ovol-dashboard
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: ovol-dashboard
        env:
          PLAYWRIGHT_TEST_BASE_URL: https://staging.kheteebaadi.app
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: ovol-dashboard/playwright-report/
          retention-days: 30

  load-test:
    name: K6 Load Test
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - uses: actions/checkout@v4

      - name: Run k6 load test
        uses: grafana/k6-action@v0.3.0
        with:
          filename: infrastructure/load-test/k6-staging.js
          cloud: false
        env:
          BASE_URL: https://staging.kheteebaadi.app

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: k6-results
          path: infrastructure/load-test/results.json
          retention-days: 30

  generate-allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: [e2e-tests, load-test]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download E2E test results
        uses: actions/download-artifact@v3
        with:
          name: playwright-report
          path: ./reports/playwright

      - name: Download K6 results
        uses: actions/download-artifact@v3
        with:
          name: k6-results
          path: ./reports/k6

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: reports/
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
